<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 110" width="400" height="110">
  <defs>
    <!-- Neon green glow for Node.js feel -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradient for the icon background hex -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0720"/>
      <stop offset="100%" style="stop-color:#1e0a3a"/>
    </linearGradient>

    <!-- Gradient for the glowing lines -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bf5fff;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#bf5fff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bf5fff;stop-opacity:0.3"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d4a0ff"/>
    </linearGradient>
  </defs>

  <!-- Hexagon background shape -->
  <polygon points="70,20 110,20 130,54 110,88 70,88 50,54"
    fill="url(#hexGrad)"
    stroke="#bf5fff"
    stroke-width="1.5"
    filter="url(#softglow)"
    opacity="0.95"/>

  <!-- Inner hex ring -->
  <polygon points="72,26 108,26 124,54 108,82 72,82 56,54"
    fill="none"
    stroke="#bf5fff"
    stroke-width="0.5"
    opacity="0.4"/>

  <!-- Document lines inside hex (stylized doc icon) -->
  <!-- Page shape -->
  <rect x="72" y="32" width="28" height="36" rx="2"
    fill="none" stroke="#bf5fff" stroke-width="1.5"
    filter="url(#glow)" opacity="0.9"/>
  <!-- Folded corner -->
  <polyline points="91,32 100,32 100,41 91,41 91,32"
    fill="#1e0a3a" stroke="#bf5fff" stroke-width="1.2"
    filter="url(#glow)" opacity="0.9"/>
  <!-- Text lines on doc -->
  <line x1="76" y1="47" x2="93" y2="47" stroke="#bf5fff" stroke-width="1.2" opacity="0.8" filter="url(#glow)"/>
  <line x1="76" y1="52" x2="96" y2="52" stroke="#bf5fff" stroke-width="1.2" opacity="0.8" filter="url(#glow)"/>
  <line x1="76" y1="57" x2="89" y2="57" stroke="#bf5fff" stroke-width="1.2" opacity="0.8" filter="url(#glow)"/>
  <!-- Node.js-style JS indicator -->
  <text x="78" y="67" font-family="'Courier New', monospace" font-size="8"
    fill="#bf5fff" filter="url(#glow)" opacity="1" font-weight="bold">{js}</text>

  <!-- Decorative circuit dot on hex -->
  <circle cx="130" cy="54" r="3" fill="#bf5fff" filter="url(#glow)" opacity="0.8"/>
  <circle cx="50" cy="54" r="3" fill="#bf5fff" filter="url(#glow)" opacity="0.8"/>
  <line x1="133" y1="54" x2="148" y2="54" stroke="#bf5fff" stroke-width="1" opacity="0.4"/>

  <!-- Main wordmark: DocNode -->
  <text x="155" y="62"
    font-family="'Courier New', Courier, monospace"
    font-size="34"
    font-weight="bold"
    letter-spacing="-1"
    fill="url(#textGrad)"
    filter="url(#glow)">DocNode</text>

  <!-- Tagline -->
  <text x="157" y="82"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    fill="#bf5fff"
    opacity="0.7"
    letter-spacing="3">CLASS DOCUMENTATION</text>

  <!-- Decorative underline glow bar -->
  <rect x="155" y="87" width="220" height="1.5" fill="url(#lineGrad)" opacity="0.6" rx="1"/>

  <!-- Small node graph decoration (top right) -->
  <circle cx="355" cy="28" r="4" fill="none" stroke="#bf5fff" stroke-width="1.2" opacity="0.5" filter="url(#glow)"/>
  <circle cx="375" cy="18" r="3" fill="none" stroke="#bf5fff" stroke-width="1" opacity="0.4"/>
  <circle cx="378" cy="38" r="3" fill="none" stroke="#bf5fff" stroke-width="1" opacity="0.4"/>
  <line x1="359" y1="26" x2="373" y2="20" stroke="#bf5fff" stroke-width="0.8" opacity="0.35"/>
  <line x1="359" y1="30" x2="375" y2="36" stroke="#bf5fff" stroke-width="0.8" opacity="0.35"/>
</svg>
